name: Auto Issue Manager

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  issue_manager:
    runs-on: ubuntu-latest
    steps:
      - name: AI Issue Triage
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;
            const apiKey = process.env.OPENAI_API_KEY;
            
            // Skip if no API key is provided
            if (!apiKey) {
              console.log("No OPENAI_API_KEY secret found. Skipping AI triage.");
              return;
            }
            
            const prompt = `You are an AI repository manager for a project called LeetCode City.
            A new issue has been created by @${issue.user.login}:
            Title: ${issue.title}
            Body: ${issue.body}
            
            Evaluate this issue. Is it a good issue, or does it seem like spam, redundant, or low-effort?
            Respond with a brief, friendly comment addressing the user.
            If it's good, thank them and say a maintainer will review it shortly.
            If it's poor quality or a duplicate, gently ask for more details or clarification. Keep it concise.`;
            
            try {
              const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'user', content: prompt }]
                })
              });
              
              const data = await res.json();
              if (data.choices && data.choices.length > 0) {
                const reply = data.choices[0].message.content;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: reply
                });
              }
            } catch (err) {
              console.error("AI Triage Error:", err);
            }

      - name: Handle Auto-Assignment
        if: github.event_name == 'issue_comment' && !github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body.toLowerCase();
            const commenter = context.payload.comment.user.login;
            const assignees = context.payload.issue.assignees.map(a => a.login);
            
            // Keywords that indicate a user wants to be assigned
            const wantsAssignment = 
              commentBody.includes('assign me') || 
              commentBody.includes('i would like to work on this') || 
              commentBody.includes('can i take this') || 
              commentBody.includes('gssoc');
            
            if (wantsAssignment) {
              if (assignees.length === 0) {
                // Issue is unassigned -> Assign the user
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees: [commenter]
                });
                
                // Welcome message
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Hello @${commenter}, you have been selected to work on this issue! 🚀 Please read the \`CONTRIBUTING.md\` file before starting. We look forward to your Pull Request.`
                });
                
                // Automatically add labels if not present
                const labels = context.payload.issue.labels.map(l => l.name);
                const labelsToAdd = [];
                if (!labels.includes("Gssoc 26")) labelsToAdd.push("Gssoc 26");
                if (!labels.includes("gssoc:approved")) labelsToAdd.push("gssoc:approved");
                
                if (labelsToAdd.length > 0) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    labels: labelsToAdd
                  });
                }
              } else if (!assignees.includes(commenter)) {
                // Issue is already assigned
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Hi @${commenter}, this issue is already assigned to @${assignees[0]}. Issues are assigned on a first-come, first-served basis. Please feel free to look for other unassigned issues to contribute to! 🌟`
                });
              }
            }

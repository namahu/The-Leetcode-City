name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: AI Security & Code Review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const apiKey = process.env.OPENAI_API_KEY;
            if (!apiKey) {
              console.log("No OPENAI_API_KEY provided. Skipping AI review.");
              return;
            }
            
            console.log("Fetching PR diff...");
            const diffResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: 'diff' }
            });
            
            const diff = diffResponse.data;
            if (!diff || diff.length === 0) {
              console.log("Empty diff. Nothing to review.");
              return;
            }
            
            // Truncate diff to avoid token limits for large PRs
            const truncatedDiff = diff.substring(0, 15000); 
            
            const prompt = `You are a strict security and code quality reviewer for the LeetCode City open-source project.
            Review the following Pull Request diff:
            
            ${truncatedDiff}
            
            Your absolute top priorities are:
            1. Security & Backdoors: Rigorously analyze the code for malicious code, compromised security, or vulnerabilities.
            2. Logic & Stability: Look for edge cases, memory leaks, and logical bugs.
            
            Instructions:
            - If you find ANY mistakes, security vulnerabilities, or bugs, respond with exactly "STATE: CHANGES_REQUESTED" on the first line, followed by a detailed explanation of what the user needs to fix.
            - If the code looks perfectly secure and bug-free, respond with exactly "STATE: APPROVED" on the first line, followed by a brief positive summary.
            `;
            
            console.log("Sending diff to OpenAI...");
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prompt }]
              })
            });
            
            const data = await res.json();
            if (!data.choices || data.choices.length === 0) {
              console.error("Failed to get a response from OpenAI", data);
              return;
            }
            
            const reply = data.choices[0].message.content;
            
            let reviewEvent = 'COMMENT';
            if (reply.includes('STATE: APPROVED')) {
              reviewEvent = 'APPROVE';
            } else if (reply.includes('STATE: CHANGES_REQUESTED')) {
              reviewEvent = 'REQUEST_CHANGES';
            }
            
            // Clean the reply text
            const cleanReply = reply
              .replace(/STATE: APPROVED/g, '✅ **AI Review: Approved**\n')
              .replace(/STATE: CHANGES_REQUESTED/g, '❌ **AI Review: Changes Requested**\n')
              .replace(/STATE: COMMENT/g, '💬 **AI Review: Comment**\n');
            
            console.log("Submitting review...");
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: cleanReply,
              event: reviewEvent
            });
            console.log("Review submitted successfully.");
